<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple mobile-first kettlebell yearly planner and workout tracker."
    />
    <meta name="theme-color" content="#f6f3ed" />
    <title>Kettlebell Year</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const theme = window.localStorage.getItem("kettlebell-year.theme.v1");
        if (theme === "light" || theme === "dark" || theme === "pink-teal") {
          document.documentElement.dataset.theme = theme;
        }
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
